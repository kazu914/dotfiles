id = "kazu914.tab-actions"
name = "Tab Actions"
version = "0.3.0"
min_herdr_version = "0.7.0"
description = "Move tabs and open a keyboard workspace picker."
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release"]
platforms = ["linux", "macos"]

[[actions]]
id = "tab-move-right"
title = "Move Tab Right"
contexts = ["pane", "tab", "workspace"]
command = ["./target/release/tab-move", "right"]

[[actions]]
id = "tab-move-left"
title = "Move Tab Left"
contexts = ["pane", "tab", "workspace"]
command = ["./target/release/tab-move", "left"]

[[actions]]
id = "open-workspace-picker"
title = "Open Workspace Picker"
contexts = ["pane", "tab", "workspace"]
command = ["./target/release/workspace-picker-open"]

[[panes]]
id = "workspace-picker"
title = "Workspace Picker"
placement = "overlay"
command = ["./target/release/workspace-picker"]
